# Override used only by the CI smoke test (see
# .github/workflows/docker-publish.yml). Builds every image locally for the
# runner's native arch instead of pulling from GHCR, and publishes ports to
# the host so the workflow can curl each service directly.
#
#   docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.ci.yml \
#     up --build -d backend-go backend-rust backend-ts react-ui angular-ui
#
# cloudflared/watchtower are intentionally left out of the `up` service list
# above — they need real tunnel credentials and have nothing to do with the
# smoke test.
services:
  backend-go:
    build:
      context: ../apps/backend-go
      dockerfile: Dockerfile
    ports:
      - "8080:8080"

  backend-rust:
    build:
      context: ../apps/backend-rust
      dockerfile: Dockerfile
    ports:
      - "8081:8081"

  backend-ts:
    build:
      context: ..
      dockerfile: apps/backend-ts/Dockerfile
    ports:
      - "8082:8082"

  react-ui:
    build:
      context: ..
      dockerfile: apps/react-ui/Dockerfile
    ports:
      - "8090:80"

  angular-ui:
    build:
      context: ..
      dockerfile: apps/angular-ui/Dockerfile
    ports:
      - "8091:80"
